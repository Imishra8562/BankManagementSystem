<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account Management</title>
    <style>
        /* CSS for menu button */
        #menuButton {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* CSS for menu items */
        .menuItem {
            display: block;
            padding: 10px 20px;
            background-color: #f1f1f1;
            border: none;
            cursor: pointer;
        }

        .menuItem:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <h1>Bank Account Management</h1>

    <!-- Menu Button -->
    <button id="menuButton">Menu</button>
    <div id="menu"   style="display: none;">
        <button class="menuItem" data-action="Save">Save</button>
        <button class="menuItem" data-action="Delete">Delete</button>
        <button class="menuItem" data-action="Update">Update</button>
        <button class="menuItem" data-action="Search">Search</button>
        <button class="menuItem" data-action="AllSearch">All Search</button>
    </div>

    <!-- Form -->
    <form id="form" action="Account_jsp.jsp" method="post">
        <label for="t1">Account Number:</label>
        <input type="text" id="t1" name="t1" required><br><br>

        <label for="t2">Customer ID:</label>
        <input type="text" id="t2" name="t2" required><br><br>

        <label for="t3">Account Status Code:</label>
        <input type="text" id="t3" name="t3" required><br><br>

        <label for="t4">Account Type Code:</label>
        <input type="text" id="t4" name="t4" required><br><br>
    </form>

    <script>
        // Function to handle menu button click
        document.getElementById("menuButton").addEventListener("click", function() {
            var menu = document.getElementById("menu");
            if (menu.style.display === "none") {
                menu.style.display = "block";
            } else {
                menu.style.display = "none";
            }
        });

        // Function to handle menu item click
        var menuItems = document.getElementsByClassName("menuItem");
        for (var i = 0; i < menuItems.length; i++) {
            menuItems[i].addEventListener("click", function() {
                var action = this.getAttribute("data-action");
                document.getElementById("form").innerHTML += "<input type='hidden' name='b1' value='" + action + "'>";
                document.getElementById("form").submit();
            });
        }
    </script>
</body>
</html>
